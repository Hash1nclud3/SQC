name: Hybrid Code Quality Pipeline

on:
  pull_request:
    types: [opened, synchronize]
  # Enables the "Run workflow" manual button in the GitHub Actions UI
  workflow_dispatch:
    inputs:
      ai_provider:
        description: 'Select the AI Provider to execute architectural validation'
        required: true
        default: 'gemini'
        type: choice
        options:
          - gemini
          - openai
          - bedrock
      run_sonar:
        description: 'Execute SonarCloud baseline scan?'
        required: true
        type: boolean
        default: false
      pr_number:
        description: 'Optional PR Number (Leaves a comment on the PR if provided)'
        required: false
        type: string

jobs:
  hybrid-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      # ⬇️ REQUIRED TO POST TO THE NATIVE GITHUB SECURITY TAB ⬇️
      security-events: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install LLM Core Libraries
        run: npm install @google/genai openai @aws-sdk/client-bedrock-runtime

      # ------------------------------------------------------------
      # STATIC BASELINE SCAN (SonarCloud)
      # ------------------------------------------------------------
      - name: SonarCloud Scan
        # Runs automatically on PRs, or manually if the box is checked in the UI
        if: ${{ github.event_name == 'pull_request' || inputs.run_sonar == true }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ------------------------------------------------------------
      # INTELLIGENT EXPERT REVIEW (Multi-LLM Layer)
      # ------------------------------------------------------------
      - name: Extract Target Git Diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_changes.diff
          else
            git diff origin/main...HEAD > pr_changes.diff
          fi

      - name: Execute Multi-LLM AI Evaluation
        if: success()
        env:
          AI_PROVIDER: ${{ github.event.inputs.ai_provider || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO_NAME: ${{ github.repository }}
        run: node .github/scripts/hybrid-orchestrator.js

      # ------------------------------------------------------------
      # SECURITY DASHBOARD INTEGRATION
      # ------------------------------------------------------------
      - name: Upload AI Results to GitHub Security Tab
        uses: github/code-scanning-upload-sarif@v3
        # Use always() to upload the SARIF report even if the script exited with code 1 (BLOCKED)
        if: always()
        with:
          sarif_file: ai-results.sarif
          category: AI-Architect-Review
