name: Hybrid Code Quality Pipeline

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      ai_provider:
        description: 'Select the AI Provider to execute architectural validation'
        required: true
        default: 'gemini'
        type: choice
        options:
          - gemini
          - openai
          - bedrock
      scan_mode:
        description: 'Scan Mode: Diff (PR changes only) or Full (Entire Repository)'
        required: true
        default: 'diff'
        type: choice
        options:
          - diff
          - full
      run_sonar:
        description: 'Execute SonarCloud baseline scan?'
        required: true
        type: boolean
        default: false

jobs:
  hybrid-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install LLM Core Libraries
        run: npm install @google/genai openai @aws-sdk/client-bedrock-runtime

      # ------------------------------------------------------------
      # CODEQL - NATIVE GITHUB SAST
      # ------------------------------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      # ------------------------------------------------------------
      # SONARCLOUD SCAN (Asynchronous)
      # ------------------------------------------------------------
      - name: SonarCloud Scan
        if: ${{ github.event_name == 'pull_request' || inputs.run_sonar == true }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ------------------------------------------------------------
      # INTELLIGENT EXPERT REVIEW (Multi-LLM Layer)
      # ------------------------------------------------------------
      - name: Extract Target Git Diff (If Diff Mode)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_changes.diff
          else
            git diff origin/main...HEAD > pr_changes.diff
          fi

      # ⬇️ NEW STEP: READS THE KEY DIRECTLY FROM YOUR FILE ⬇️
      - name: Extract Sonar Project Key from Properties
        run: |
          if [ -f "sonar-project.properties" ]; then
            PROJECT_KEY=$(awk -F'=' '/^sonar\.projectKey/ {print $2}' sonar-project.properties | tr -d ' \r\n')
            echo "DYNAMIC_SONAR_KEY=$PROJECT_KEY" >> $GITHUB_ENV
            echo "Successfully extracted Sonar Project Key: $PROJECT_KEY"
          else
            echo "⚠️ sonar-project.properties not found!"
          fi

      - name: Execute Multi-LLM AI Evaluation & Fetch Sonar API
        if: success()
        env:
          AI_PROVIDER: ${{ github.event.inputs.ai_provider || 'gemini' }}
          SCAN_MODE: ${{ github.event.inputs.scan_mode || 'diff' }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # ⬇️ USES THE EXTRACTED KEY FROM THE STEP ABOVE ⬇️
          SONAR_PROJECT_KEY: ${{ env.DYNAMIC_SONAR_KEY }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node .github/scripts/hybrid-orchestrator.js

      - name: Upload Combined AI & Sonar Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ai-results.sarif
          category: Hybrid-Review-Engine
